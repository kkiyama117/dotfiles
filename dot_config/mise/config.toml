[settings]
experimental = true # enable experimental features

legacy_version_file = true                     # enabled by default (unlike asdf)
#legacy_version_file_disable_tools = ['python'] # disable for specific tools

# configure `mise install` to always keep the downloaded archive
always_keep_download = false        # deleted after install by default
always_keep_install = false         # deleted on failure by default

# configure how frequently (in minutes) to fetch updated plugin repository changes
# this is updated whenever a new runtime is installed
# (note: this isn't currently implemented but there are plans to add it: https://github.com/jdx/mise/issues/128)
plugin_autoupdate_last_check_duration = '1 week' # set to 0 to disable updates

# config files with these prefixes will be trusted by default.
# 2026-04-30: `~/programs` 全体から、実際に mise config を置いている
# プロジェクト直下のみへ縮小 (H-4 deferred クローズ)。
# 新規 mise プロジェクトを追加した際は **このリストに明示登録** する運用に
# 変更。サブツリー単位の包括信頼 (`~/programs/research` 等) には戻さない —
# `others/` や `old/` 等の信頼度不明領域を巻き込むのを避けるため。
trusted_config_paths = [
    '~/programs/research/data_manager',
    '~/programs/research/data_manager2',
    '~/programs/tools/everything-claude-code',
]

verbose = false     # set to true to see full installation output, see `MISE_VERBOSE`
asdf_compat = false # set to true to ensure .tool-versions will be compatible with asdf, see `MISE_ASDF_COMPAT`
http_timeout = "30s"   # set the timeout for http requests in seconds, see `MISE_HTTP_TIMEOUT`
jobs = 4            # number of plugins or runtimes to install in parallel. The default is `4`.
raw = false         # set to true to directly pipe plugins to stdin/stdout/stderr
# H-4: 確認プロンプトを残す (タイポやサプライチェーン事故への防御)。
yes = false         # set to true to automatically answer yes to all prompts

# H-4: 未インストールコマンドの自動インストール (タイポスクワッティング攻撃面) を抑止。
not_found_auto_install = false # see MISE_NOT_FOUND_AUTO_INSTALL
task_output = "prefix" # see Tasks Runner for more information
# H-4: tool ダウンロードのチェックサム/署名検証を有効化。
paranoid = true        # see MISE_PARANOID

shorthands_file = '~/.config/mise/shorthands.toml' # path to the shorthands file, see `MISE_SHORTHANDS_FILE`
disable_default_registry = true
disable_tools = ['python','rust']           # disable specific tools, generally used to turn off core tools

# M-2: 任意ディレクトリの `.env` を黙って読み込むと、サードパーティ repo に
# `cd` するだけで環境変数が汚染されうる。明示が必要なら direnv 等で運用する。
#env_file = '.env' # load env vars from a dotenv file, see `MISE_ENV_FILE`

# configure messages displayed when entering directories with config files
status = { missing_tools = "if_other_versions_installed", show_env = false, show_tools = false }

#############################################################################
go_set_gobin = true

#############################################################################
[env]

# Go
GOPATH = '/home/kiyama/.local/share/mise/installs/go/latest/packages'
GOROOT = '/home/kiyama/.local/share/mise/installs/go/latest'

# Java
_JAVA_OPTIONS = '-Djava.util.prefs.userRoot=/home/kiyama/.config/java'
GRADLE_USER_HOME = '/home/kiyama/.local/share/gradle'

# node
#NODE_ENV = 'production'
#NPM_CONFIG_USERCONFIG = '/home/kiyama/.config/npm/npmrc'

# ocaml
#OPAMROOT = '/home/kiyama/.local/share/opam'
#[[ ! -r "$XDG_DATA_HOME/opam-init/init.zsh" ]] || source "$XDG_DATA_HOME/opam-init/init.zsh"  > /dev/null 2> /dev/null

[tools]
bun = "latest"
deno = "latest"
go = "latest"
java = "22"
julia = "latest"
node = "latest"
#opam = "latest"
pnpm = "latest"
ruby = "latest"
#ruby = "latest"
usage = "latest"

