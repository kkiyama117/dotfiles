# `sheldon` configuration file
# ----------------------------
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"
apply = ["defer"]

# templates for use zsh-defer
[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"

[plugins]
#############################################################################
# "defer"
#############################################################################
# H-3: zsh-defer はリリースタグを切らない方針のため `rev` で固定。
# 更新は意図的な操作のみ — 差分を確認した上で sha を上げる。
[plugins.zsh-defer]
github = "romkatv/zsh-defer"
rev = "53a26e287fbbe2dcebb3aa1801546c6de32416fa"
apply = ['source']

#############################################################################
# Zshell opt-in
#############################################################################
[plugins.compinit]
inline = 'autoload -Uz compinit && zsh-defer compinit'
[plugins.colors]
inline = 'autoload -Uz colors && zsh-defer colors'

#############################################################################
# program language load
#############################################################################
[plugins.mise]
inline = 'eval "$(mise activate zsh)"'

#############################################################################
# defered plugins
#############################################################################
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
tag = "v0.7.1"
apply = ['defer']

[plugins.zsh-autosuggestions.hooks]
post = "source ~/.config/zsh/rc/integrations/zsh-autosuggestions_atload.zsh"

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
tag = "0.36.0"
apply = ['defer']

[plugins.zsh-completions.hooks]
pre = "source ~/.config/zsh/rc/integrations/zsh-autocompletions_atinit.zsh"

# シンタックスハイライトは fast-syntax-highlighting (zdharma-continuum) のみを使用。
# 旧 zsh-users/zsh-syntax-highlighting は重複ロードのため削除済み。
# H-3 / H-12 deferred (2026-04-30 完了): auscompgeek フォークは 2020-02 で停止 → 現役メンテの
# zdharma-continuum へ移行。最新リリースタグ v1.56 (2025-07-16, sha 5ecd353c8121) で固定。
[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"
tag = "v1.56"
apply = ['defer']

#############################################################################
# graphic and view
#############################################################################
[plugins.starship]
inline = 'eval "$(starship init zsh)"'

#############################################################################
# tmux
#############################################################################
[plugins.tmux-xpanes]
github = "greymd/tmux-xpanes"
tag = "v4.2.0"
apply = ['defer']

#############################################################################
# Zsh local config
#############################################################################
[plugins.my_conf_pre_load]
local="~/.config/zsh/rc"
use=["{options,secrets,for_development}.zsh"]
# 同期 source (defer しない) — secrets.zsh の env と for_development.zsh の
# PATH/env を Claude Code/codex plugin 等、プロンプト直後の子プロセスにも
# 確実に継承させるため。
apply = ['source']

[plugins.my_conf_defered]
local="~/.config/zsh/rc"
use=["{aliases,completion}.zsh"]
apply = ['defer']

# Original executables
[plugins.my_executables]
local = "~/.config/zsh/bin"
apply = ['path']

# Completion fpath
[plugins.my_fpaths]
local="~/.config/zsh/.zfunc"
apply = ["fpath"]

[plugins.my_plugins]
local="~/.config/zsh/rc"
use=["{functions/*,my_plugins/*}.zsh"]
apply = ['defer']

# Config of cli tools
[plugins.software_integrations]
local="~/.config/zsh/rc/integrations"
apply = ['defer']
