# Kitty 設定
# - フォント / 透明度 / ブラー は ghostty と揃える (dot_config/ghostty/config)
# - デフォルトキーマップは tmux / fcitx5 / zsh と衝突するので全クリアし、
#   ターミナル内で本当に必要なものだけ復活させる方針 (ghostty と同じ)。

# Font ===================================================================
# wezterm.lua.tmpl と同じく PlemolJP Console NF Medium を使う。
# ghostty 側にも明示的に同じファミリを指定して見た目を揃える。
font_family      PlemolJP Console NF Medium
bold_font        auto
italic_font      auto
bold_italic_font auto
# kitty は設計上 Xft.dpi を無視し、xrandr 物理寸法から DPI を計算する
# (この環境では ~96 DPI)。一方 ghostty は Xft.dpi (= 117) を採用するため、
# 同じ 12pt でも ghostty 19.5px / kitty 16px と約 1.22 倍ズレる。
# ghostty 側 12pt (= 19.5px) に揃える換算は 12 × 117/96 = 14.625 だが、
# 半端を避けて 14.5 に丸める (実描画 ≈ 19.33px、差 0.17px)。
font_size        14.5

# Window =================================================================
background_opacity 0.45
background_blur    10
# kitty default `placement_strategy center` は ghostty の
# `window-padding-balance = true` と等価 (cell に割り切れない余りを
# 上下左右に均等配分)。明示不要。

# Keybinds ===============================================================
# ghostty と同様、デフォルトキーバインドを一括クリアし、
# 外部アプリ→ターミナルへのペーストだけ復活させる。
# tmux でタブ/ペイン/分割/コピーを管理しているため kitty 側のショートカット
# (Ctrl+Shift+T 等) は不要。詳細は docs/keybinds.md 参照。
clear_all_shortcuts yes
map ctrl+shift+v paste_from_clipboard
