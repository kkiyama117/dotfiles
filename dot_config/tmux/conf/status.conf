# tmux status bar config. Sourced from tmux.conf.

# 5 秒間隔（claude プロセス監視のため少し短め）
set -g status-interval 5

# status bar / pane / window のスタイル (dmux デフォルト由来)。
# active pane を背景色でハイライトしてフォーカスを目立たせる。
set -g status-style 'bg=colour236'
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=default,bg=colour234'
set -g pane-border-style "fg=colour238 bg=default"
set -g pane-active-border-style "fg=blue bg=default"

# 左: セッション識別子 + プレフィックス入力中 / key-table 入力中インジケータ
set -g status-left "#[fg=colour108,bg=colour237,bold] [#S:#I:#P] #{?client_prefix,⌘ ,}#{?#{!=:#{client_key_table},root},⟨#{client_key_table}⟩ ,}"
set -g status-left-length 60

# 右: claude cockpit summary + 現ペインの git branch + 時刻
set -g status-right "#(~/.local/bin/claude-cockpit-summary)#(~/.local/bin/claude-branch '#{pane_current_path}')%H:%M "
set -g status-right-length 80
