# tmux status bar config. Sourced from tmux.conf.

# 5 秒間隔（claude プロセス監視のため少し短め）
set -g status-interval 5

# status bar / pane / window のスタイル (dmux デフォルト由来)。
# 背景はすべて `default` にして端末側透過 (kitty 等の background_opacity) を尊重する。
# active/inactive ペインの区別は pane-active-border-style (fg=blue) と
# 非 active ペインの fg ディム (colour247) で行う。
set -g status-style 'bg=default'
set -g window-style 'fg=colour247,bg=default'
set -g window-active-style 'fg=default,bg=default'
set -g pane-border-style "fg=colour238 bg=default"
set -g pane-active-border-style "fg=blue bg=default"

# 左: セッション識別子 + プレフィックス入力中 / key-table 入力中インジケータ
# bg=default で端末側透過を尊重 (tmux 自身は背景を塗らない)。
set -g status-left "#[fg=colour108,bg=default,bold] [#S:#I:#P] #{?client_prefix,⌘ ,}#{?#{!=:#{client_key_table},root},⟨#{client_key_table}⟩ ,}"
set -g status-left-length 60

# 右: claude cockpit summary + 現ペインの git branch + 時刻
set -g status-right "#(~/.local/bin/claude-cockpit-summary)#(~/.local/bin/claude-branch '#{pane_current_path}')%H:%M "
set -g status-right-length 80
