# tmux options (general). Sourced from tmux.conf.

# prefix は tmux デフォルトの C-b。
# 過去に C-t / C-Space / C-\ / C-] / F12 / C-a を試したが、いずれも症状の
# 真因 (Ghostty + X11 + GTK DE での focus-events 暴発、後述) を見落として
# いた早合点だった。focus-events off で根本解決した今、SKK default rule
# の C-b 消費は実機で観測できず無害なので default に戻す。
# 詳細は docs/keybinds.md
set -g prefix C-b
bind C-b send-prefix

# マウス操作を有効にする
set-option -g mouse on
set -g mouse on

# tmux を true color で表示
set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# esc 遅延をなくす
set-option -s escape-time 0

# ウィンドウ番号を 1 始まりに
set-option -g base-index 1

# pane-border-status を上に
set -g pane-border-status top

# focus events: pane border 動的色や resurrect が利用したかったが、
# Ghostty + X11 + GTK DE (MATE/Cinnamon) では Ghostty が過剰に focus
# 通知を送るバグがあり、tmux が prefix の前に focus event を消費して
# 「1 回目の prefix が効かない (2 連打で効く)」現象を起こす。
# https://github.com/ghostty-org/ghostty/discussions/9620
# Wayland/KDE 等では再現しないので Ghostty 側の修正待ち。それまでは off。
set -g focus-events off

# vi mode keys for copy mode
setw -g mode-keys vi
