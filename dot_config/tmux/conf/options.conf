# tmux options (general). Sourced from tmux.conf.

# prefix は tmux デフォルトの C-b。
# 過去に C-t / C-Space / C-\ / C-] / F12 / C-a を試したが、いずれも症状の
# 真因 (Ghostty + X11 + GTK DE での focus-events 暴発、後述) を見落として
# いた早合点だった。kitty 主運用に移行したことで focus-events を on に
# 戻しても prefix 暴発は再現しない。SKK default rule の C-b 消費も実機で
# 観測できず無害なので default に戻す。
# 詳細は docs/keybinds.md
set -g prefix C-b
bind C-b send-prefix

# マウス操作を有効にする
set-option -g mouse on
set -g mouse on

# tmux を true color で表示
set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# 端末から拡張キー (Ctrl-Shift-Arrow など) を受け取る。
# bindings.conf の C-S-Arrow ペイン移動が動作するために必須。
set -g extended-keys on

# カーソル形状の上下伝搬 (vim/nvim の挿入モードで blink bar など)。
set-option -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# 端末識別を子プロセスへ伝搬 (zellij や IDE の挙動切替で使われる)。
set-option -ga update-environment "TERM_PROGRAM"

# OSC エスケープのパススルーを許可 (画像表示・iTerm2 統合などで必要)。
set-option -g allow-passthrough on

# クリップボード (OSC 52)
# tmux 3.x の `MouseDown3Pane` デフォルト display-menu は "Copy <word>" などで
# `set-buffer` を呼ぶが、これは tmux 内部バッファに入れるだけ。
# 外側 kitty(`xterm-kitty`) の terminfo は OSC 52 (`Ms`) 対応だが、
# default-terminal の `screen-256color` には `Ms` が無い & 既定の
# `set-clipboard external` では tmux 自身が OSC 52 を発行しないため、
# 右クリックメニューからの "Copy URL" がシステムクリップボードに届かない。
# - `set-clipboard on` で tmux 側でも OSC 52 を生成
# - `terminal-features ... :clipboard` で screen-* に clipboard 機能を宣言
# 詳細: https://github.com/tmux/tmux/wiki/Clipboard
set-option -g set-clipboard on
set-option -ga terminal-features ",screen*:clipboard"

# esc 遅延をなくす
set-option -s escape-time 0

# ウィンドウ番号を 1 始まりに
set-option -g base-index 1

# pane-border-status を上に
set -g pane-border-status top

# focus events: pane border 動的色 / nvim の autoread / tmux-resurrect で
# 利用するため有効化。
# 主に kitty で運用するので Ghostty の focus-event 暴発バグ
# (ghostty-org/ghostty#9620) の影響を受けない。
# Ghostty + X11 + GTK DE (MATE/Cinnamon) を併用していて
# 「1 回目の prefix が効かない (2 連打で効く)」現象が再発する場合は、
# その端末で起動するときだけ一時的に off に戻すこと。
set -g focus-events on

# vi mode keys for copy mode
setw -g mode-keys vi
