# tmux key bindings. Sourced from tmux.conf.

# マウスホイールでコピーモード（既存）
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# vim 風 pane 移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 高速 pane 移動: prefix なしの Ctrl-Shift-Arrow (dmux デフォルト由来)。
# options.conf の `extended-keys on` が前提。
bind -n C-S-Left  select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up    select-pane -U
bind -n C-S-Down  select-pane -D

# window 作成・移動
bind  M-c new-window -c "#{pane_current_path}"
bind  J next-window
bind  K previous-window

# session 作成・移動
bind  M-C new-session
bind  L switch-client -n
bind  H switch-client -p

# pane 分割（カレント PWD を継承）
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# pane kill
bind q kill-pane

# copy mode (vi)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi Y send -X copy-line

# --- セッション / worktree ピッカー（直下） ---

# prefix + s : claude-* に絞らない全 session ピッカー
bind s display-popup -E "tmux list-sessions -F '#S' | fzf --prompt='session> ' --height=100% | xargs -r tmux switch-client -t"

# prefix + g : 現リポジトリの git worktree から選んで新ウィンドウで開く
bind g display-popup -E "git worktree list --porcelain | awk '/^worktree /{print \$2}' | fzf --prompt='worktree> ' --height=100% | xargs -r -I {} tmux new-window -c {}"

# prefix + G : 現 pane の cwd で lazygit を popup 起動
bind -N "lazygit popup (cwd)" G display-popup -E -w 95% -h 95% -d "#{pane_current_path}" "lazygit"

# --- claude_table（二段プレフィックス: prefix + C, <key>） ---

bind C switch-client -T claude_table

# c: 現ペインで claude --continue を流す
bind -N "現 pane で claude --continue" \
  -T claude_table c \
  send-keys "claude --continue" Enter

# n: ブランチ選択 → tmux-claude-new
# -d は popup cwd をアクティブ pane の path にし、`git for-each-ref` を成立させる
bind -N "branch fzf → 新規 worktree + 2-pane Claude session" \
  -T claude_table n \
  display-popup -E -d "#{pane_current_path}" "~/.local/bin/claude-pick-branch"

# o: ブランチ選択 → worktree shell-only (claude を起動しない)
bind -N "branch fzf → 新規 worktree (shell-only, claude 無し)" \
  -T claude_table o \
  display-popup -E -d "#{pane_current_path}" "~/.local/bin/claude-pick-branch --no-claude"

# r: アクティブ claude ペインを kill → 再起動
bind -N "現 session の claude pane を kill → 再起動" \
  -T claude_table r \
  run-shell "~/.local/bin/claude-respawn-pane"

# s: session/window/pane 階層スイッチャ（cockpit）
bind -N "session/window/pane 階層スイッチャ (cockpit)" \
  -T claude_table s \
  display-popup -E "~/.local/bin/claude-cockpit-switcher"

# N: 要対応 pane に inbox 順で循環ジャンプ (waiting 優先 → done)
bind -N "要対応 pane に循環ジャンプ (waiting 優先 → done、各バケット内 inbox 順)" \
  -T claude_table N \
  run-shell "~/.local/bin/claude-cockpit-next-ready"

# k: 現 window + worktree を削除（要確認）
bind -N "window + worktree 削除 (確認あり、最後の window なら session も destroy)" \
  -T claude_table k \
  confirm-before -p "kill claude window and worktree? (y/n) " "run-shell '~/.local/bin/claude-kill-session'"

# ?: このテーブルのヘルプ表示（tmux の prefix + ? と同じ流儀）
bind -N "claude_table バインド一覧をポップアップ表示" \
  -T claude_table '?' \
  display-popup -E -h 60% -w 80% "tmux list-keys -T claude_table -N | sort | less -R"
