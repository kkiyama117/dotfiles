# TPM プラグイン宣言。
# 注: tmux.conf 末尾で source されること。最後に `run -b ~/.config/tmux/plugins/tpm/tpm` が走る。

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# resurrect: pane 内容まで含めて保存
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# continuum: 15 分間隔の自動保存。起動時の自動復元は無効
# (default session と復元 session が共存して window が混在するため)。
# 復元は手動: prefix + Ctrl-R (tmux-resurrect)
set -g @continuum-save-interval '15'
# set -g @continuum-restore 'on'  # disabled: 自動復元は混在事故の元
